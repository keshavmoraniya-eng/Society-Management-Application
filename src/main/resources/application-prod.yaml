spring:
  datasource:
    url: jdbc:mysql://${RDS_HOST:localhost}:3306/${RDS_DB:society_db}
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: WARN
    com.society: INFO
