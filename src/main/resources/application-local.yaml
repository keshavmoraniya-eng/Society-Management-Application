spring:
  application:
    name: society-management
  datasource:
    url: jdbc:mysql://localhost:3306/society_db?createDatabaseIfNotExist=true
    username: root
    password: Keshav798794
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET:"bXktc3VwZXItc2VjdXJlLWp3dC1zZWNyZXQta2V5LW1pbmltdW0tMzItY2hhcmFjdGVycw=="}
  expiration: 86400000
  refresh-expiration: 604800000


otp:
  expiration-minutes: 5
  length: 6

logging:
  level:
    root: INFO
    com.society: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html